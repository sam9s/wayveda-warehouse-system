name: Deploy Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on:
      - self-hosted
      - linux
      - x64
      - wayveda-vps

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner context
        run: |
          hostname
          whoami
          pwd
          git rev-parse HEAD

      - name: Sync deployment repo on VPS
        run: |
          set -euo pipefail
          cd /root/apps/wayveda-warehouse-system
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          echo "Deployed commit: $(git rev-parse HEAD)"

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          cd /root/apps/wayveda-warehouse-system/backend
          npm ci

      - name: Install frontend dependencies
        run: |
          set -euo pipefail
          cd /root/apps/wayveda-warehouse-system/frontend
          npm ci

      - name: Build frontend
        run: |
          set -euo pipefail
          cd /root/apps/wayveda-warehouse-system/frontend
          npm run build

      - name: Run backend migrations
        run: |
          set -euo pipefail
          cd /root/apps/wayveda-warehouse-system/backend
          npm run db:migrate

      - name: Restart backend with PM2
        run: |
          set -euo pipefail
          cd /root/apps/wayveda-warehouse-system
          pm2 startOrRestart ecosystem.config.js --env production
          pm2 save

      - name: Verify backend health
        run: |
          set -euo pipefail
          curl --fail --silent --show-error http://127.0.0.1:4002/api/health

      - name: Verify frontend shell
        run: |
          set -euo pipefail
          curl --fail --silent --show-error http://127.0.0.1:4002/ | grep -qi "<!doctype html>"
